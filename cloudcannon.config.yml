# CloudCannon Configuration
# Documentation: https://cloudcannon.com/documentation/articles/cloudcannon-configuration-file/

paths:
  static: public
  uploads: public/uploads
timezone: Asia/Saigon

collections_config:
  film:
    path: src/content/film
    output: true
    url: /film/[slug]/
    icon: movie
    reorderable: true
    sort: order
    sort_options:
      - label: Manual Order
        value: order
        order: asc
      - label: Title
        value: title
        order: asc
    fields:
      - name: title
        label: Title
        type: text
      - name: slug
        label: URL Slug
        type: text
        comment: Nhập slug cho URL (ví dụ: phim-cua-toi). Không dùng dấu, khoảng trắng.
      - name: order
        label: Display Order (1 = first)
        type: number
      - name: year
        label: Year
        type: number
      - name: category
        label: Category (Lock)
        type: select
        options:
          values:
            - film
      - name: role
        label: Role
        type: text
      - name: duration
        label: Duration
        type: text
      - name: thumbnail
        label: Thumbnail URL
        type: text
        comment: Paste URL ảnh thumbnail (ví dụ từ media.lediemquynh.com)
      - name: videoUrl
        label: Video URL (YouTube/Vimeo)
        type: text
      - name: stills
        label: Stills
        type: array
        field:
          type: text
          label: Still URL
      - name: description
        label: SEO Description
        type: textarea
      - name: featured
        label: Featured
        type: checkbox
      - name: pubDate
        label: Publication Date
        type: date

  music-video:
    path: src/content/music-video
    output: true
    url: /music-video/[slug]/
    icon: music_note
    reorderable: true
    sort: order
    sort_options:
      - label: Manual Order
        value: order
        order: asc
      - label: Title
        value: title
        order: asc
    fields:
      - name: title
        label: Title
        type: text
      - name: slug
        label: URL Slug
        type: text
        comment: Nhập slug cho URL (ví dụ: phim-cua-toi). Không dùng dấu, khoảng trắng.
      - name: order
        label: Display Order (1 = first)
        type: number
      - name: year
        label: Year
        type: number
      - name: category
        label: Category (Lock)
        type: select
        options:
          values:
            - music-video
      - name: role
        label: Role
        type: text
      - name: client
        label: Artist
        type: text
      - name: duration
        label: Duration
        type: text
      - name: thumbnail
        label: Thumbnail URL
        type: text
        comment: Paste URL ảnh thumbnail (ví dụ từ media.lediemquynh.com)
      - name: videoUrl
        label: Video URL (YouTube/Vimeo)
        type: text
      - name: stills
        label: Stills
        type: array
        field:
          type: text
          label: Still URL
      - name: description
        label: SEO Description
        type: textarea
      - name: featured
        label: Featured
        type: checkbox
      - name: pubDate
        label: Publication Date
        type: date

  commercial:
    path: src/content/commercial
    output: true
    url: /commercial/[slug]/
    icon: business
    reorderable: true
    sort: order
    sort_options:
      - label: Manual Order
        value: order
        order: asc
      - label: Title
        value: title
        order: asc
    fields:
      - name: title
        label: Title
        type: text
      - name: slug
        label: URL Slug
        type: text
        comment: Nhập slug cho URL (ví dụ: phim-cua-toi). Không dùng dấu, khoảng trắng.
      - name: order
        label: Display Order (1 = first)
        type: number
      - name: year
        label: Year
        type: number
      - name: category
        label: Category (Lock)
        type: select
        options:
          values:
            - commercial
      - name: role
        label: Role
        type: text
      - name: client
        label: Client
        type: text
      - name: duration
        label: Duration
        type: text
      - name: thumbnail
        label: Thumbnail URL
        type: text
        comment: Paste URL ảnh thumbnail (ví dụ từ media.lediemquynh.com)
      - name: videoUrl
        label: Video URL (YouTube/Vimeo)
        type: text
      - name: stills
        label: Stills
        type: array
        field:
          type: text
          label: Still URL
      - name: description
        label: SEO Description
        type: textarea
      - name: featured
        label: Featured
        type: checkbox
      - name: pubDate
        label: Publication Date
        type: date

# CloudCannon UI refinements
_inputs:
  title:
    type: text
    comment: The title of the page or post.
  order:
    type: number
    label: Display Order
    comment: Nhập số (1, 2, 3...). Số nhỏ nhất sẽ hiện đầu tiên.
  description:
    type: textarea
    comment: A brief summary for SEO purposes.
  pubDate:
    type: date
  heroImage:
    type: image
  thumbnail:
    type: text
    comment: URL của ảnh thumbnail (có thể paste link hoặc upload lên CDN trước)
  stills:
    type: array
    field:
      type: image
  category:
    type: select
    options:
      values:
        - film
        - music-video
        - commercial

# Build options for Astro
_build_options:
  server:
    command: npm run build
    output: dist
    base_url: /
