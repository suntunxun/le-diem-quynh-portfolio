site_url: https://lediemquynh.com

backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "film"
    label: "Film"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    filter: { field: "category", value: "film" }
    fields:
      - { label: "Tieu de", name: "title", widget: "string" }
      - { label: "Nam", name: "year", widget: "number" }
      - { name: "category", widget: "hidden", default: "film" }
      - { label: "Vai tro", name: "role", widget: "string", hint: "VD: Director, Screenwriter" }
      - { label: "Thoi luong", name: "duration", widget: "string", required: false, hint: "VD: 18 phut" }
      - { label: "Thumbnail (16:9)", name: "thumbnail", widget: "image", required: false }
      - { label: "Link video (YouTube / Vimeo)", name: "videoUrl", widget: "string", required: false }
      - label: "Still Frames"
        name: "stills"
        widget: "list"
        required: false
        field: { label: "Anh", name: "still", widget: "image" }
      - { label: "Mo ta ngan (SEO)", name: "description", widget: "text" }
      - { label: "Noi dung thong tin tac pham", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Ngay", name: "pubDate", widget: "datetime" }

  - name: "music-video"
    label: "Music Video"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    filter: { field: "category", value: "music-video" }
    fields:
      - { label: "Tieu de", name: "title", widget: "string" }
      - { label: "Nam", name: "year", widget: "number" }
      - { name: "category", widget: "hidden", default: "music-video" }
      - { label: "Vai tro", name: "role", widget: "string", hint: "VD: Director" }
      - { label: "Nghe si / Client", name: "client", widget: "string", required: false }
      - { label: "Thumbnail (16:9)", name: "thumbnail", widget: "image", required: false }
      - { label: "Link video (YouTube / Vimeo)", name: "videoUrl", widget: "string", required: false }
      - label: "Still Frames"
        name: "stills"
        widget: "list"
        required: false
        field: { label: "Anh", name: "still", widget: "image" }
      - { label: "Mo ta ngan (SEO)", name: "description", widget: "text" }
      - { label: "Noi dung thong tin tac pham", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Ngay", name: "pubDate", widget: "datetime" }

  - name: "commercial"
    label: "Commercial"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    filter: { field: "category", value: "commercial" }
    fields:
      - { label: "Tieu de", name: "title", widget: "string" }
      - { label: "Nam", name: "year", widget: "number" }
      - { name: "category", widget: "hidden", default: "commercial" }
      - { label: "Vai tro", name: "role", widget: "string", hint: "VD: Director" }
      - { label: "Client", name: "client", widget: "string", required: false }
      - { label: "Thoi luong", name: "duration", widget: "string", required: false, hint: "VD: 30 giay" }
      - { label: "Thumbnail (16:9)", name: "thumbnail", widget: "image", required: false }
      - { label: "Link video (YouTube / Vimeo)", name: "videoUrl", widget: "string", required: false }
      - label: "Still Frames"
        name: "stills"
        widget: "list"
        required: false
        field: { label: "Anh", name: "still", widget: "image" }
      - { label: "Mo ta ngan (SEO)", name: "description", widget: "text" }
      - { label: "Noi dung thong tin tac pham", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Ngay", name: "pubDate", widget: "datetime" }
